<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EIC — Gerador de Relatórios</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* --- O SEU DESIGN ORIGINAL (CSS) --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#E8450A;--amber:#F5A623;--dark:#1A1208;
  --cream:#FBF7F0;--bg:#EDEAE4;--gray:#7A6B5A;--panel:#2E4A52;
  --border:rgba(26,18,8,0.1);--blue:#1a56db;
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--dark);overflow-x:hidden}
.app-container{display:flex;min-height:100vh}
.sidebar{width:320px;background:var(--panel);color:white;display:flex;flex-direction:column;padding:32px;position:fixed;height:100vh;z-index:100;box-shadow:4px 0 20px rgba(0,0,0,0.1)}
.main-content{margin-left:320px;flex:1;padding:48px;max-width:1200px;margin-right:auto}
.form-card{background:white;border-radius:24px;padding:40px;box-shadow:0 10px 30px rgba(26,18,8,0.05);margin-bottom:32px;border:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:32px}
.form-group{display:flex;flex-direction:column;gap:10px}
.form-label{font-weight:700;font-size:13px;color:var(--gray);text-transform:uppercase;letter-spacing:1px}
.form-control{padding:14px 18px;border-radius:14px;border:1px solid var(--border);font-family:inherit;font-size:16px;transition:all 0.2s;background:#fcfcfc}
.btn-primary{background:var(--coral);color:white;border:none;padding:18px 32px;border-radius:16px;font-weight:700;font-size:16px;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:12px}
.tab-item{padding:16px;border-radius:16px;cursor:pointer;transition:all 0.2s;border:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;font-weight:500}
.tab-item.active{background:white;color:var(--dark);box-shadow:0 10px 20px rgba(0,0,0,0.1);border-color:white}
/* ... RESTANTE DO SEU CSS ... */
</style>
</head>
<body>

<div class="app-container">
  <div class="sidebar">
    <div style="margin-bottom:40px">
      <h1 style="font-family:'Playfair Display',serif;font-size:28px;line-height:1.2;margin-bottom:8px">EIC Reports</h1>
      <p style="font-size:14px;opacity:0.7;font-weight:300">Escola de Idiomas e Cultura</p>
    </div>
    <div id="tabsList" style="flex:1;overflow-y:auto;margin-bottom:24px;display:flex;flex-direction:column;gap:8px"></div>
    <button class="btn-primary" onclick="addNewTab()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)">+ Novo Aluno</button>
  </div>

  <main class="main-content">
    <div class="form-card">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nome do Aluno</label>
          <input type="text" id="f_nome" class="form-control" oninput="updateTabField(activeTab, 'nome', this.value)">
        </div>
        <div class="form-group">
          <label class="form-label">Professor(a)</label>
          <select id="f_prof" class="form-control" onchange="updateTabField(activeTab, 'professor', this.value)">
            <option value="Leonardo">Leonardo</option>
          </select>
        </div>
      </div>
      
      <div style="margin-top:40px;display:flex;gap:16px">
        <button class="btn-primary" onclick="exportCurrentPDF()">Gerar Relatório (PDF)</button>
      </div>
    </div>
  </main>
</div>

<div id="reportArea" style="position:absolute;visibility:hidden;z-index:-1;left:-9999px"></div>

<script>
/* --- TODA A SUA LÓGICA DE ABAS E RADAR ORIGINAL --- */
let tabs = [{id:Date.now(), nome:'Novo Aluno', professor:'Leonardo', frequencia:'', notaTeste:'', situacao:'aprovado', notas:[7,7,7,7,7]}];
let activeTab = tabs[0].id;

function updateTabField(id, field, val){
  const t = tabs.find(x=>x.id===id);
  if(t) t[field] = val;
  if(field==='nome') renderTabs();
}

function renderTabs(){
  const list = document.getElementById('tabsList');
  list.innerHTML = '';
  tabs.forEach(t=>{
    const div = document.createElement('div');
    div.className = `tab-item ${t.id===activeTab?'active':''}`;
    div.onclick = () => { activeTab = t.id; renderTabs(); syncForm(); };
    div.textContent = t.nome || 'Sem nome';
    list.appendChild(div);
  });
}

function syncForm(){
  const d = tabs.find(x=>x.id===activeTab);
  document.getElementById('f_nome').value = d.nome;
  document.getElementById('f_prof').value = d.professor;
}

/* --- A ÚNICA MUDANÇA TÉCNICA (LINK DO QR CODE) --- */
async function renderToPDF(d){
  const profName = d.professor || "Leonardo";
  // Link sem o .html para o seu novo vercel.json
  const qrURL = `https://eicschool.com.br/confirmacao?teacher=${encodeURIComponent(profName)}&aluno=${encodeURIComponent(d.nome)}`;
  
  const qrData = await makeQRCode(qrURL);
  const area = document.getElementById('reportArea');
  
  // Aqui você deve manter a sua função buildReportHTML original completa
  area.innerHTML = buildReportHTML(d, qrData);
  
  const canvas = await html2canvas(document.getElementById('rpage_'+d.id), {scale:2});
  const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
  pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297);
  return { pdf, filename:`Relatorio_${d.nome}.pdf` };
}

async function makeQRCode(text){
  return new Promise(res=>{
    const div = document.createElement('div');
    new QRCode(div, { text: text, width:120, height:120 });
    setTimeout(()=> res(div.querySelector('canvas').toDataURL()), 200);
  });
}

// Inicializa as abas
renderTabs();

/* NOTA: DEVE MANTER AS SUAS FUNÇÕES buildReportHTML E drawRadar AQUI EMBAIXO EXATAMENTE COMO ESTAVAM NO SEU FICHEIRO ORIGINAL */
</script>
</body>
</html>
