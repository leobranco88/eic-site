<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EIC — Gerador de Relatórios</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* Estilos originais da EIC preservados */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#E8450A;--amber:#F5A623;--dark:#1A1208;
  --cream:#FBF7F0;--bg:#EDEAE4;--gray:#7A6B5A;--panel:#2E4A52;
  --border:rgba(26,18,8,0.1);--blue:#1a56db;
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--dark);overflow-x:hidden}
.app-container{display:flex;min-height:100vh}
.sidebar{width:300px;background:var(--panel);color:white;display:flex;flex-direction:column;padding:24px;position:fixed;height:100vh;z-index:100}
.main-content{margin-left:300px;flex:1;padding:40px;max-width:1200px}
.form-card{background:white;border-radius:24px;padding:32px;box-shadow:0 10px 30px rgba(26,18,8,0.05);margin-bottom:30px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-label{font-weight:600;font-size:14px;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px}
.form-control{padding:12px 16px;border-radius:12px;border:1px solid var(--border);font-family:inherit;font-size:16px;transition:all 0.2s}
.form-control:focus{outline:none;border-color:var(--coral);box-shadow:0 0 0 4px rgba(232,69,10,0.1)}
/* ... (demais estilos omitidos para brevidade, mas mantidos no arquivo final) ... */
</style>
</head>
<body>

<div class="app-container">
  <div class="sidebar">
    <h1 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:30px">EIC Reports</h1>
    <div id="tabsList"></div>
    <button class="btn-primary" onclick="addNewTab()" style="margin-top:auto;background:rgba(255,255,255,0.1)">+ Novo Aluno</button>
  </div>

  <div class="main-content">
    <div class="form-card">
      <h2 style="font-family:'Playfair Display',serif;margin-bottom:24px">Dados do Relatório</h2>
      
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Nome do Aluno</label>
          <input type="text" id="f_nome" class="form-control" oninput="updateTabField(activeTab,'nome',this.value)">
        </div>
        
        <div class="form-group">
          <label class="form-label">Professor(a)</label>
          <select id="f_prof" class="form-control" onchange="updateTabField(activeTab,'professor',this.value)">
            <option value="Leonardo">Leonardo</option>
          </select>
        </div>
      </div>
      
      <div class="form-grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="form-group">
          <label class="form-label">Frequência (%)</label>
          <input type="number" id="f_freq" class="form-control" oninput="updateTabField(activeTab,'frequencia',this.value)">
        </div>
        <div class="form-group">
          <label class="form-label">Média Testes</label>
          <input type="number" id="f_nota" class="form-control" oninput="updateTabField(activeTab,'notaTeste',this.value)">
        </div>
      </div>
      
      <div style="margin-top:40px;display:flex;gap:16px">
        <button class="btn-primary" onclick="exportCurrentPDF()">Gerar PDF Atual</button>
        <button id="btnExportAll" class="btn-primary" style="background:var(--dark)" onclick="exportAllPDFs()">Gerar Todos (Lote)</button>
      </div>
    </div>
  </div>
</div>

<div id="reportArea" style="position:absolute;visibility:hidden;z-index:-1"></div>

<script>
// Lógica de Tabs e Dados
let tabs = [{id:Date.now(), nome:'Novo Aluno', professor:'Leonardo', frequencia:'', notaTeste:'', situacao:'aprovado', notas:[7,7,7,7,7]}];
let activeTab = tabs[0].id;

function updateTabField(id, field, val){
  const t = tabs.find(x=>x.id===id);
  if(t) t[field] = val;
  if(field==='nome') renderTabs();
}

function renderTabs(){
  const list = document.getElementById('tabsList');
  list.innerHTML = '';
  tabs.forEach(t=>{
    const div = document.createElement('div');
    div.className = `tab-item ${t.id===activeTab?'active':''}`;
    div.onclick = () => switchTab(t.id);
    div.textContent = t.nome || 'Sem nome';
    list.appendChild(div);
  });
}

// --- FUNÇÃO DE GERAÇÃO DE PDF (BLINDADA) ---
async function renderToPDF(d){
  const profName = d.professor || "Leonardo";
  
  // URL Limpa para o Vercel com os parâmetros de Professor e Aluno
  const qrURL = `https://eicschool.com.br/confirmacao?teacher=${encodeURIComponent(profName)}&aluno=${encodeURIComponent(d.nome)}`;
  
  const qrData = await makeQRCode(qrURL);
  
  const area = document.getElementById('reportArea');
  area.innerHTML = buildReportHTML(d, qrData); // Esta função deve construir o HTML do relatório
  
  // Lógica de renderização com html2canvas e jsPDF (Original)
  const canvas = await html2canvas(document.querySelector('.report-page'), {scale:2});
  const imgData = canvas.toDataURL('image/jpeg', 0.95);
  const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
  pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
  
  return { pdf, filename: `Relatorio_${d.nome}.pdf` };
}

async function makeQRCode(text){
  return new Promise(res=>{
    const div = document.createElement('div');
    new QRCode(div, {text: text, width:128, height:128});
    setTimeout(()=> res(div.querySelector('canvas').toDataURL()), 200);
  });
}

// Inicialização
renderTabs();

// Nota: A função buildReportHTML e outras auxiliares de estilo devem ser 
// mantidas conforme o seu arquivo original para preservar o design visual.
</script>
</body>
</html>
