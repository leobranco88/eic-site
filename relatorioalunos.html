<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EIC — Gerador de Relatórios Pedagógicos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* IDENTIDADE VISUAL EIC - PRESERVADA */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--coral:#E8450A;--amber:#F5A623;--dark:#1A1208;--cream:#FBF7F0;--bg:#EDEAE4;--gray:#7A6B5A;--panel:#2E4A52;--border:rgba(26,18,8,0.1)}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--dark);display:flex;min-height:100vh}
.sidebar{width:320px;background:var(--panel);color:white;padding:32px;position:fixed;height:100vh;display:flex;flex-direction:column;gap:24px}
.main-content{margin-left:320px;flex:1;padding:48px;max-width:1200px}
.form-card{background:white;border-radius:24px;padding:32px;box-shadow:0 10px 40px rgba(0,0,0,0.05)}
.form-control{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);margin-top:8px;font-size:16px}
.btn-primary{background:var(--coral);color:white;border:none;padding:16px 24px;border-radius:12px;font-weight:700;cursor:pointer;transition:0.2s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(232,69,10,0.3)}
/* Estilos do PDF Oculto */
#reportArea{position:absolute;left:-9999px;top:0}
</style>
</head>
<body>

<div class="sidebar">
    <h2 style="font-family:'Playfair Display';font-size:28px">EIC Reports</h2>
    <div id="tabsList"></div>
    <button onclick="window.addNewTab()" class="btn-primary" style="background:rgba(255,255,255,0.1)">+ Novo Aluno</button>
</div>

<div class="main-content">
    <div class="form-card">
        <h3 style="font-family:'Playfair Display';font-size:24px;margin-bottom:24px">Dados do Aluno</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
            <div>
                <label>Nome do Aluno</label>
                <input type="text" id="f_nome" class="form-control" oninput="window.updateData('nome', this.value)">
            </div>
            <div>
                <label>Professor(a)</label>
                <select id="f_prof" class="form-control" onchange="window.updateData('professor', this.value)">
                    <option value="Leonardo">Leonardo</option>
                </select>
            </div>
        </div>
        
        <div style="margin-top:32px;display:flex;gap:16px">
            <button onclick="window.exportCurrentPDF()" class="btn-primary">Gerar Relatório (PDF)</button>
        </div>
    </div>
</div>

<div id="reportArea"></div>

<script>
// --- LÓGICA DO SISTEMA ---
let tabs = [{id: Date.now(), nome: 'Novo Aluno', professor: 'Leonardo', notas: [7,7,7,7,7]}];
let activeTab = tabs[0].id;

window.updateData = function(field, val) {
    const tab = tabs.find(t => t.id === activeTab);
    if(tab) tab[field] = val;
    window.renderTabs();
};

window.addNewTab = function() {
    const newTab = {id: Date.now(), nome: 'Novo Aluno', professor: 'Leonardo', notas: [7,7,7,7,7]};
    tabs.push(newTab);
    activeTab = newTab.id;
    window.renderTabs();
};

window.renderTabs = function() {
    const list = document.getElementById('tabsList');
    list.innerHTML = '';
    tabs.forEach(t => {
        const btn = document.createElement('div');
        btn.style.padding = '12px';
        btn.style.background = t.id === activeTab ? 'rgba(255,255,255,0.2)' : 'transparent';
        btn.style.borderRadius = '8px';
        btn.style.cursor = 'pointer';
        btn.innerText = t.nome;
        btn.onclick = () => { activeTab = t.id; window.renderTabs(); window.syncForm(); };
        list.appendChild(btn);
    });
};

window.syncForm = function() {
    const t = tabs.find(x => x.id === activeTab);
    document.getElementById('f_nome').value = t.nome;
    document.getElementById('f_prof').value = t.professor;
};

// --- GERAÇÃO DO PDF ---
window.exportCurrentPDF = async function() {
    const t = tabs.find(x => x.id === activeTab);
    const btn = document.querySelector('.btn-primary');
    btn.innerText = "Gerando...";
    
    // Link QR Code corrigido para a agenda do Leonardo
    const qrURL = `https://eicschool.com.br/confirmacao?teacher=${encodeURIComponent(t.professor)}&aluno=${encodeURIComponent(t.nome)}`;
    const qrData = await window.makeQRCode(qrURL);
    
    const area = document.getElementById('reportArea');
    area.innerHTML = `
        <div id="pdf_render" style="width:210mm; height:297mm; background:white; padding:20px; position:relative;">
            <h1 style="color:var(--coral); font-family:'Playfair Display'; font-size:40px;">Student Progress Report</h1>
            <p style="font-size:20px; margin-top:10px;">Student: ${t.nome}</p>
            <p>Teacher: ${t.professor}</p>
            <div style="margin-top:50px; text-align:center;">
                <p>Escaneie para agendar sua reunião:</p>
                <img src="${qrData}" style="width:150px; margin-top:10px;">
            </div>
            <div style="position:absolute; bottom:40px; left:40px; color:var(--gray)">EIC — Escola de Idiomas e Cultura</div>
        </div>
    `;

    const canvas = await html2canvas(document.getElementById('pdf_render'), {scale: 2});
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297);
    pdf.save(`Relatorio_${t.nome}.pdf`);
    
    btn.innerText = "Gerar Relatório (PDF)";
    area.innerHTML = "";
};

window.makeQRCode = function(text) {
    return new Promise(res => {
        const div = document.createElement('div');
        new QRCode(div, { text: text, width: 256, height: 256 });
        setTimeout(() => res(div.querySelector('canvas').toDataURL()), 300);
    });
};

window.renderTabs();
</script>
</body>
</html>
