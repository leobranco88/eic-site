<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>EIC Admin - Gestão de Agendamentos</title>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #FBF7F0; padding: 40px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #E8450A; border-bottom: 2px solid #E8450A; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2E4A52; color: white; }
        .status-reservado { color: #E8450A; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard EIC - Agendamentos</h1>
        <div id="loader">Carregando agendamentos...</div>
        <table id="tabelaAgendamentos" style="display:none;">
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Professor</th>
                    <th>Data/Hora</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Cole aqui as suas credenciais do Firebase (as mesmas do disponibilidade.html)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "eic-pagamentos.firebaseapp.com",
            projectId: "eic-pagamentos",
            storageBucket: "eic-pagamentos.appspot.com",
            messagingSenderId: "SEU_ID",
            appId: "SEU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Busca apenas os horários que foram RESERVADOS por alunos
        const q = query(collection(db, "disponibilidade"), where("status", "==", "reservado"));

        onSnapshot(q, (snapshot) => {
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = '';
            document.getElementById('loader').style.display = 'none';
            document.getElementById('tabelaAgendamentos').style.display = 'table';

            snapshot.forEach((doc) => {
                const data = doc.data();
                const row = `<tr>
                    <td>${data.aluno || 'Não informado'}</td>
                    <td>${data.professor}</td>
                    <td>${data.dia} - ${data.horario}</td>
                    <td class="status-reservado">Confirmado</td>
                </tr>`;
                corpo.innerHTML += row;
            });
        });
    </script>
</body>
</html>
