<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIC Admin - Painel de Controle</title>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #FBF7F0; padding: 20px; color: #1A1208; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #E8450A; border-bottom: 2px solid #FBF7F0; padding-bottom: 15px; }
        .section { background: #f9f9f9; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #eee; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 250px; }
        button { background: #2E4A52; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #E8450A; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #2E4A52; color: white; border-radius: 4px; }
        .prof-badge { display: inline-block; background: #E8450A; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; margin: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dashboard EIC</h1>

    <div class="section">
        <h3>+ Cadastrar Novo Professor</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="nomeProf" placeholder="Ex: Ricardo">
            <button onclick="window.addProfessor()">Adicionar Professor</button>
        </div>
        <div id="listaProf" style="margin-top:15px;"></div>
    </div>

    <div class="section">
        <h3>Próximos Agendamentos (Confirmados)</h3>
        <table>
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Professor</th>
                    <th>Dia/Hora</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // ATENÇÃO: Use as mesmas chaves que você já tem no seu disponibilidade.html
    const firebaseConfig = {
        apiKey: "SUA_API_KEY_AQUI",
        authDomain: "eic-pagamentos.firebaseapp.com",
        projectId: "eic-pagamentos",
        storageBucket: "eic-pagamentos.appspot.com",
        messagingSenderId: "SEU_SENDER_ID",
        appId: "SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // FUNÇÃO: Adicionar Professor
    window.addProfessor = async () => {
        const nome = document.getElementById('nomeProf').value.trim();
        if(!nome) return alert("Digite um nome!");
        try {
            await addDoc(collection(db, "professores"), { nome: nome });
            document.getElementById('nomeProf').value = '';
            alert("Professor cadastrado!");
        } catch(e) { console.error(e); }
    };

    // LISTAR PROFESSORES (em tempo real)
    onSnapshot(collection(db, "professores"), (snap) => {
        const div = document.getElementById('listaProf');
        div.innerHTML = "<strong>Professores na rede:</strong><br>";
        snap.forEach(doc => {
            div.innerHTML += `<span class="prof-badge">${doc.data().nome}</span>`;
        });
    });

    // LISTAR AGENDAMENTOS (onde status é 'reservado')
    const qAgendados = query(collection(db, "disponibilidade"), where("status", "==", "reservado"));
    onSnapshot(qAgendados, (snap) => {
        const corpo = document.getElementById('tabelaCorpo');
        corpo.innerHTML = '';
        snap.forEach(doc => {
            const d = doc.data();
            corpo.innerHTML += `<tr>
                <td><strong>${d.aluno || 'N/A'}</strong></td>
                <td>${d.professor}</td>
                <td>${d.dia} às ${d.horario}</td>
            </tr>`;
        });
    });
</script>
</body>
</html>
