<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIC Admin — Painel de Controle</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --coral: #E8450A; --dark: #1A1208; --bg: #EDEAE4; --cream: #FBF7F0; --panel: #2E4A52; }
        body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--dark); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: var(--cream); padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h1 { font-family: 'Playfair Display', serif; color: var(--coral); font-size: 32px; margin-bottom: 20px; text-align: center; }
        .section { background: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: var(--panel); border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 60%; font-size: 16px; }
        button { background: var(--coral); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--panel); color: white; border-radius: 4px; }
        .prof-badge { display: inline-block; background: var(--panel); color: white; padding: 6px 12px; border-radius: 20px; font-size: 13px; margin: 5px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>EIC School — Admin</h1>

    <div class="section">
        <h3>+ Adicionar Novo Professor</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="nomeProf" placeholder="Nome completo do professor">
            <button onclick="addProfessor()">Cadastrar</button>
        </div>
        <div id="listaProf" style="margin-top:15px;"></div>
    </div>

    <div class="section">
        <h3>Confirmações de Alunos</h3>
        <table>
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Professor</th>
                    <th>Data/Hora</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                <tr><td colspan="3">Carregando agendamentos...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Configurações extraídas do seu arquivo de disponibilidade
    const firebaseConfig = {
      apiKey: "AIzaSyDykKpVrCHNdq09aaxJXbF6KBqkcd2mIgM",
      authDomain: "eic-pagamentos.firebaseapp.com",
      projectId: "eic-pagamentos",
      storageBucket: "eic-pagamentos.firebasestorage.app",
      messagingSenderId: "527042889607",
      appId: "1:527042889607:web:9b69d5ae9ab55a3653f522"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Adicionar Professor
    async function addProfessor() {
        const nome = document.getElementById('nomeProf').value.trim();
        if(!nome) return alert("Por favor, digite o nome do professor.");
        try {
            await db.collection("professores").add({ nome: nome, dataCriacao: new Date() });
            document.getElementById('nomeProf').value = '';
            alert("Professor cadastrado com sucesso!");
        } catch(e) { console.error(e); alert("Erro ao salvar."); }
    }

    // Listar Professores
    db.collection("professores").orderBy("nome").onSnapshot((snap) => {
        const div = document.getElementById('listaProf');
        div.innerHTML = "<strong>Professores na rede:</strong><br>";
        snap.forEach(doc => {
            div.innerHTML += `<span class="prof-badge">${doc.data().nome}</span>`;
        });
    });

    // Listar Agendamentos (Status Reservado)
    db.collection("disponibilidade").where("status", "==", "reservado").onSnapshot((snap) => {
        const corpo = document.getElementById('tabelaCorpo');
        corpo.innerHTML = '';
        if(snap.empty) {
            corpo.innerHTML = '<tr><td colspan="3" style="text-align:center;">Nenhum agendamento encontrado.</td></tr>';
            return;
        }
        snap.forEach(doc => {
            const d = doc.data();
            corpo.innerHTML += `<tr>
                <td><strong>${d.aluno || 'Não identificado'}</strong></td>
                <td>${d.teacherId || d.professor}</td>
                <td>${d.dia} às ${d.hora || d.horario}</td>
            </tr>`;
        });
    });
</script>
</body>
</html>
