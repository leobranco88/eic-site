<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EIC — Confirmação de Relatório</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, doc, getDocs, updateDoc, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDykKpVrCHNdq09aaxJXbF6KBqkcd2mIgM",
  authDomain: "eic-pagamentos.firebaseapp.com",
  projectId: "eic-pagamentos",
  storageBucket: "eic-pagamentos.firebasestorage.app",
  messagingSenderId: "527042889607",
  appId: "1:527042889607:web:9b69d5ae9ab55a3653f522"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// --- LÓGICA DE CAPTURA DO QR CODE (URL) ---
const urlParams = new URLSearchParams(window.location.search);
const teacherId = urlParams.get('teacher') || "EIC";
const alunoNome = urlParams.get('aluno') || "Aluno";

let selectedSlotId = null;

window.answerMeeting = function(wants){
  document.getElementById('step2').classList.remove('active');
  if(wants){
    document.getElementById('step3').classList.add('active');
    loadSlots();
  } else {
    showDone("Obrigado pela confirmação! Relatório recebido com sucesso.");
  }
}

window.loadSlots = async function() {
  const container = document.getElementById('slotsContainer');
  container.innerHTML = `<div style="color:var(--gray); padding:20px; text-align:center;">Buscando horários de ${teacherId}...</div>`;
  
  try {
    // Busca apenas horários deste professor específico que estejam "livre"
    const q = query(
      collection(db, "disponibilidade"), 
      where("teacherId", "==", teacherId),
      where("status", "==", "livre")
    );
    
    const snap = await getDocs(q);
    container.innerHTML = "";

    if(snap.empty){
      container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--gray);">Não há horários disponíveis para ${teacherId} no momento.</div>`;
      return;
    }

    snap.forEach(d => {
      const data = d.data();
      const btn = document.createElement('button');
      btn.className = 'slot-pill';
      btn.innerHTML = `<strong>${data.dia}</strong> às ${data.hora}`;
      btn.onclick = () => {
        selectedSlotId = d.id;
        document.querySelectorAll('.slot-pill').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('btnBooking').disabled = false;
      };
      container.appendChild(btn);
    });
  } catch(e){ 
    console.error(e);
    container.innerHTML = "Erro ao carregar horários."; 
  }
}

window.confirmBooking = async function(){
  if(!selectedSlotId) return;
  const btn = document.getElementById('btnBooking');
  btn.disabled = true;
  btn.innerText = "Agendando...";
  
  try {
    // Atualiza o status e salva o nome do aluno que veio do QR Code
    await updateDoc(doc(db, "disponibilidade", selectedSlotId), { 
      status: "reservado", 
      aluno: alunoNome 
    });
    showDone(`Reunião agendada com sucesso para ${alunoNome}!`);
  } catch(e){ 
    alert("Erro ao agendar."); 
    btn.disabled = false; 
    btn.innerText = "Confirmar agendamento"; 
  }
}

function showDone(msg){
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step4').classList.add('active');
  document.getElementById('doneMessage').innerText = msg;
}
</script>

<style>
/* Identidade Visual EIC preservada */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--coral:#E8450A;--amber:#F5A623;--dark:#1A1208;--cream:#FBF7F0;--bg:#EDEAE4;--gray:#7A6B5A}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--dark);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:var(--cream);width:100%;max-width:400px;border-radius:24px;padding:32px;box-shadow:0 20px 40px rgba(26,18,8,0.1)}
.step{display:none}.step.active{display:block}
h2, h3{font-family:'Playfair Display',serif;margin-bottom:12px}
p{color:var(--gray);margin-bottom:20px}
.btn-primary{background:var(--coral);color:white;border:none;width:100%;padding:16px;border-radius:12px;font-weight:600;cursor:pointer;margin-top:20px;transition:opacity 0.2s}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{background:transparent;color:var(--gray);border:none;width:100%;padding:12px;cursor:pointer;margin-top:8px;font-size:14px}
.slot-pill{background:white;border:1px solid rgba(26,18,8,0.1);padding:12px;border-radius:12px;margin-bottom:8px;width:100%;text-align:left;cursor:pointer;transition:all 0.2s}
.slot-pill.selected{border-color:var(--coral);background:rgba(232,69,10,0.05);box-shadow:0 0 0 1px var(--coral)}
#doneMessage{font-weight:500;text-align:center;color:var(--dark)}
</style>
</head>
<body>
<div class="card">
  <div class="step active" id="step2">
    <h2>Relatório Visualizado!</h2>
    <p>Deseja agendar uma reunião com o professor para falar sobre o desempenho?</p>
    <button class="btn-primary" onclick="answerMeeting(true)">Sim, quero agendar</button>
    <button class="btn-secondary" onclick="answerMeeting(false)">Não, apenas confirmar leitura</button>
  </div>

  <div class="step" id="step3">
    <h3>Horários Disponíveis</h3>
    <p>Selecione um dos horários abaixo para sua reunião de 30 minutos.</p>
    <div id="slotsContainer"></div>
    <button class="btn-primary" id="btnBooking" onclick="confirmBooking()" disabled>Confirmar agendamento</button>
  </div>

  <div class="step" id="step4">
    <div style="text-align:center; margin-bottom:20px;">
      <svg width="5
