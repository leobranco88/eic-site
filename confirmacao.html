<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EIC — Confirmação de Relatório</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, doc, getDocs, updateDoc, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDykKpVrCHNdq09aaxJXbF6KBqkcd2mIgM",
  authDomain: "eic-pagamentos.firebaseapp.com",
  projectId: "eic-pagamentos",
  storageBucket: "eic-pagamentos.firebasestorage.app",
  messagingSenderId: "527042889607",
  appId: "1:527042889607:web:9b69d5ae9ab55a3653f522"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const teacherId = urlParams.get('teacher') || "EIC";
const alunoNome = urlParams.get('aluno') || "Aluno";
let selectedSlotId = null;

// TORNANDO AS FUNÇÕES GLOBAIS PARA O CLIQUE
window.answerMeeting = function(wants){
  document.getElementById('step2').classList.remove('active');
  if(wants){
    document.getElementById('step3').classList.add('active');
    window.loadSlots();
  } else {
    window.showDone("Obrigado pela confirmação! Relatório recebido.");
  }
}

window.loadSlots = async function() {
  const container = document.getElementById('slotsContainer');
  container.innerHTML = "Buscando horários...";
  try {
    const q = query(collection(db, "disponibilidade"), where("teacherId", "==", teacherId), where("status", "==", "livre"));
    const snap = await getDocs(q);
    container.innerHTML = "";
    if(snap.empty){
      container.innerHTML = "Não há horários para este professor.";
      return;
    }
    snap.forEach(d => {
      const data = d.data();
      const btn = document.createElement('button');
      btn.className = 'slot-pill';
      btn.innerHTML = `${data.dia} às ${data.hora}`;
      btn.onclick = () => {
        selectedSlotId = d.id;
        document.querySelectorAll('.slot-pill').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('btnBooking').disabled = false;
      };
      container.appendChild(btn);
    });
  } catch(e){ container.innerHTML = "Erro ao carregar horários."; }
}

window.confirmBooking = async function(){
  if(!selectedSlotId) return;
  const btn = document.getElementById('btnBooking');
  btn.innerText = "Agendando...";
  try {
    await updateDoc(doc(db, "disponibilidade", selectedSlotId), { 
      status: "reservado", 
      aluno: alunoNome 
    });
    window.showDone(`Agendado com sucesso para ${alunoNome}!`);
  } catch(e){ alert("Erro."); btn.innerText = "Confirmar"; }
}

window.showDone = function(msg){
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step4').classList.add('active');
  document.getElementById('doneMessage').innerText = msg;
}
</script>
<style>
/* Estilos mantidos da sua versão original */
:root{--coral:#E8450A;--bg:#EDEAE4;--cream:#FBF7F0}
body{background:var(--bg); font-family:'DM Sans', sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px}
.card{background:var(--cream); width:100%; max-width:400px; border-radius:24px; padding:32px; box-shadow:0 10px 30px rgba(0,0,0,0.05)}
.step{display:none}.active{display:block}
.btn-primary{background:var(--coral); color:white; border:none; width:100%; padding:16px; border-radius:12px; cursor:pointer; margin-top:10px}
.slot-pill{background:white; border:1px solid #ddd; padding:12px; border-radius:10px; margin-bottom:8px; width:100%; cursor:pointer}
.slot-pill.selected{border-color:var(--coral); background:rgba(232,69,10,0.05)}
</style>
</head>
<body>
<div class="card">
  <div class="step active" id="step2">
    <h2>Relatório Visualizado!</h2>
    <p>Deseja agendar uma reunião?</p>
    <button class="btn-primary" onclick="window.answerMeeting(true)">Sim, quero agendar</button>
    <button style="background:none; border:none; width:100%; margin-top:10px;" onclick="window.answerMeeting(false)">Apenas confirmar leitura</button>
  </div>
  <div class="step" id="step3">
    <h3>Horários Disponíveis</h3>
    <div id="slotsContainer"></div>
    <button class="btn-primary" id="btnBooking" onclick="window.confirmBooking()" disabled>Confirmar agendamento</button>
  </div>
  <div class="step" id="step4">
    <h2 id="doneMessage"></h2>
  </div>
</div>
</body>
</html>
